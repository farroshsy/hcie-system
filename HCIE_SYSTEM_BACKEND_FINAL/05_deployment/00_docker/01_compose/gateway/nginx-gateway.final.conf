# nginx-gateway.final.conf — single ingress for the FINAL stack.
#
# Routes:
#   /api/*    → api (with /api prefix stripped, so /api/v3/foo hits /v3/foo)
#   /v3/*     → api (passthrough)
#   /healthz  → api passthrough (mirrors uvicorn /healthz)
#   /metrics  → api passthrough (Prometheus scrape target)
#   /ws*      → projection-stream-gateway WebSocket upstream
#   /         → frontend (Next.js standalone)

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Rate limits matching the API-side limiter (~40 req/s).
    limit_req_zone $binary_remote_addr zone=api_zone:10m rate=40r/s;
    limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=5r/s;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent rt=$request_time '
                    'urt="$upstream_response_time"';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    upstream api_backend {
        server api:8000;
        keepalive 32;
    }

    upstream frontend_backend {
        server frontend:3000;
        keepalive 32;
    }

    upstream ws_backend {
        # WS routes (/ws/learning/{id}, /ws/projections/{id}) live on the API.
        # (The projection-stream-gateway worker is a Kafka consumer, not a WS server.)
        server api:8000;
        keepalive 16;
    }

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Security headers (defence in depth; Next.js already sets CSP)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ---- Gateway health (returns 200 even when api is rebooting) ----
        location = /gateway-healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # ---- API passthrough (FINAL routes live under /v3/*) ----
        location /v3/ {
            limit_req zone=api_zone burst=80 nodelay;
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            # Chrome Private Network Access (PNA) — required for localhost-to-localhost
            add_header 'Access-Control-Allow-Private-Network' 'true' always;
        }

        # ---- Frontend-friendly /api/ prefix (strip then forward) ----
        # Lets FrontendV3 use NEXT_PUBLIC_API_URL=http://localhost/api/v3 if
        # desired, while still allowing callers to hit /v3/* directly.
        location /api/ {
            limit_req zone=api_zone burst=80 nodelay;
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header 'Access-Control-Allow-Private-Network' 'true' always;
        }

        # ---- Auth endpoints: stricter rate limit (mirrors backend) ----
        location ~* ^/v3/auth/(login|register|refresh) {
            limit_req zone=auth_zone burst=10 nodelay;
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- API surface needed by the Phase 3 sweep + monitoring ----
        location = /healthz {
            proxy_pass http://api_backend/healthz;
        }
        location = /metrics {
            proxy_pass http://api_backend/metrics;
        }

        # ---- WebSocket: projection-stream-gateway ----
        location /ws {
            proxy_pass http://ws_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ---- Default: frontend (Next.js) ----
        location / {
            proxy_pass http://frontend_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Next.js hot-reload / RSC streaming
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 60s;
        }
    }
}
