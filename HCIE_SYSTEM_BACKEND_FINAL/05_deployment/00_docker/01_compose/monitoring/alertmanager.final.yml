# alertmanager.final.yml — minimal alert routing for the FINAL stack.
# Keeps everything in a single "default" receiver until the Phase-3 alert
# rules are written. Slack / email integrations can be wired in later.
global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "service"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default

receivers:
  - name: default

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname", "service"]
