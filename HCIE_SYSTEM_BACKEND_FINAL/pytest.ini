[pytest]
minversion = 6.0
testpaths = 02_tests
addopts = -ra --strict-markers
norecursedirs = _legacy 00_documentation tools 01_source 03_scripts 04_config 05_deployment 06_monitoring 07_database 08_security 09_research 10_research_validation 11_build 12_logs
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
