# prometheus.final.yml — canonical scrape config for the FINAL stack.
# Targets resolve via the ``hcie-final-net`` docker network; container
# names match docker-compose.final.yml.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alerting + recording/alert rules (mounted at /etc/prometheus/rules by the compose
# prometheus service). alertmanager runs in the observability profile.
rule_files:
  - /etc/prometheus/rules/alerts.yml
  - /etc/prometheus/rules/kafka_lag_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: hcie-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
    scrape_interval: 10s

  - job_name: hcie-kt-baselines
    metrics_path: /metrics
    static_configs:
      - targets: ["hcie-final-kt-baselines:8000"]
    scrape_interval: 30s

  - job_name: hcie-dlq-replay-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["dlq-replay-worker:8003"]
    scrape_interval: 15s

  - job_name: hcie-auto-healer
    metrics_path: /metrics
    static_configs:
      - targets: ["auto-healer:8004"]
    scrape_interval: 15s

  - job_name: hcie-outbox-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["outbox-worker:8005"]
    scrape_interval: 30s

  - job_name: redpanda
    static_configs:
      - targets: ["kafka:9644"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
    scrape_interval: 30s

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]
    scrape_interval: 30s

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
    scrape_interval: 15s

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
    scrape_interval: 15s

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
    scrape_interval: 30s
