# otel-collector-config.final.yaml — minimal pipeline for the FINAL stack.
# Receives OTLP traces from the API and re-exports metrics for Prometheus.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

exporters:
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: hcie_final
  debug:
    verbosity: basic
  # Forward traces to Tempo (otlp grpc; tempo distributor listens on 4317).
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  # Forward application logs (OTLP from the API when ENABLE_OTLP_LOGS=true) to Loki.
  loki:
    endpoint: http://loki:3100/loki/api/v1/push

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, otlp/tempo]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [loki]
