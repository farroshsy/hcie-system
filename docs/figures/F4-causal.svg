<svg viewBox="0 0 1040 720" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img">
<title>Shuffled-DAG causal control: observed cross-family durable transfer versus placebo and permutation null</title>
<desc>A horizontal forest plot comparing observed cross-family durable transfer (0.0992) against a future-to-past placebo (0.0405), the residual (0.0587), and a permutation null band centered at -0.0144 over 100 shuffles, with p=0.0099 and n=200,418. Proximity and same-family magnitudes are shown muted because they are larger.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
<path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
</marker>
<marker id="arrowblue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-end">
<path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
</marker>
</defs>

<rect width="1040" height="720" fill="#ffffff"/>

<text x="32" y="42" font-size="22" font-weight="bold" fill="#0f172a">Shuffled-DAG causal control</text>
<text x="32" y="64" font-size="13" fill="#475569">does prerequisite structure CAUSE durable transfer? (tier5_topology_mag)</text>

<text x="32" y="104" font-size="13" font-weight="bold" fill="#334155">the test: shuffle the prerequisite DAG, re-measure transfer</text>

<text x="56" y="132" font-size="11.5" fill="#64748b">real DAG (prereq order preserved)</text>
<g>
<rect x="40" y="142" width="100" height="44" rx="8" fill="#E1F5EE" stroke="#1e293b" stroke-width="1.4"/>
<text x="90" y="169" font-size="12" fill="#0f172a" text-anchor="middle">Concept A</text>
<rect x="40" y="216" width="100" height="44" rx="8" fill="#E1F5EE" stroke="#1e293b" stroke-width="1.4"/>
<text x="90" y="243" font-size="12" fill="#0f172a" text-anchor="middle">Concept B</text>
</g>
<line x1="90" y1="186" x2="90" y2="214" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
<path d="M140,164 C200,164 200,238 140,238" fill="none" stroke="#2563eb" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#arrowblue)"/>
<rect x="186" y="193" width="40" height="18" rx="4" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
<text x="206" y="206" font-size="11" fill="#2563eb" text-anchor="middle">0.90</text>

<path d="M90 290 l9 9 l-9 9 l-9 -9 z" fill="#dc2626"/>
<text x="110" y="304" font-size="11" fill="#dc2626">mastery gate ≥ 0.80</text>

<text x="56" y="344" font-size="11.5" fill="#64748b">shuffled DAG (order randomized ×100)</text>
<g>
<rect x="40" y="354" width="100" height="44" rx="8" fill="#F1EFE8" stroke="#1e293b" stroke-width="1.4"/>
<text x="90" y="381" font-size="12" fill="#0f172a" text-anchor="middle">Concept A</text>
<rect x="40" y="428" width="100" height="44" rx="8" fill="#F1EFE8" stroke="#1e293b" stroke-width="1.4"/>
<text x="90" y="455" font-size="12" fill="#0f172a" text-anchor="middle">Concept B</text>
</g>
<line x1="90" y1="426" x2="90" y2="400" stroke="#334155" stroke-width="1.6" stroke-dasharray="2 3" marker-end="url(#arrow)"/>
<text x="150" y="416" font-size="10.5" fill="#94a3b8">edges randomized</text>
<text x="150" y="430" font-size="10.5" fill="#94a3b8">→ null distribution</text>

<text x="40" y="510" font-size="11" fill="#475569" font-style="italic">If structure causes transfer, the real</text>
<text x="40" y="526" font-size="11" fill="#475569" font-style="italic">effect should beat the shuffled null.</text>

<line x1="300" y1="100" x2="300" y2="540" stroke="#e2e8f0" stroke-width="1"/>

<text x="332" y="104" font-size="13" font-weight="bold" fill="#334155">durable transfer magnitude (AUC gain)</text>

<line x1="380" y1="130" x2="380" y2="500" stroke="#cbd5e1" stroke-width="1.2"/>
<text x="380" y="518" font-size="10.5" fill="#94a3b8" text-anchor="middle">0</text>

<line x1="513.3" y1="130" x2="513.3" y2="500" stroke="#f1f5f9" stroke-width="1"/>
<text x="513.3" y="518" font-size="10.5" fill="#cbd5e1" text-anchor="middle">0.04</text>
<line x1="646.7" y1="130" x2="646.7" y2="500" stroke="#f1f5f9" stroke-width="1"/>
<text x="646.7" y="518" font-size="10.5" fill="#cbd5e1" text-anchor="middle">0.08</text>
<line x1="780" y1="130" x2="780" y2="500" stroke="#f1f5f9" stroke-width="1"/>
<text x="780" y="518" font-size="10.5" fill="#cbd5e1" text-anchor="middle">0.12</text>

<rect x="290" y="130" width="90" height="370" fill="#fee2e2" opacity="0.45"/>
<line x1="331.9" y1="130" x2="331.9" y2="500" stroke="#dc2626" stroke-width="1.3" stroke-dasharray="4 3"/>
<text x="331.9" y="146" font-size="10.5" fill="#b91c1c" text-anchor="middle">null mean</text>
<text x="331.9" y="159" font-size="10.5" fill="#b91c1c" text-anchor="middle">−0.0144</text>
<text x="335" y="494" font-size="10" fill="#ef4444">permutation null (100 shuffles)</text>

<text x="372" y="172" font-size="11.5" fill="#94a3b8" text-anchor="end">same-family (caveat)</text>
<rect x="380" y="160" width="389.1" height="26" rx="4" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1"/>
<text x="777" y="178" font-size="11.5" fill="#94a3b8">0.117</text>

<text x="372" y="206" font-size="11.5" fill="#94a3b8" text-anchor="end">proximity (caveat)</text>
<rect x="380" y="194" width="439.5" height="26" rx="4" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1"/>
<text x="827.5" y="212" font-size="11.5" fill="#94a3b8">0.132</text>

<text x="600" y="240" font-size="10.5" fill="#94a3b8" font-style="italic">these confounds are LARGER — the headline effect is not the whole story</text>

<text x="372" y="276" font-size="12" fill="#0f172a" font-weight="bold" text-anchor="end">observed (cross-family, durable)</text>
<rect x="380" y="262" width="330.7" height="30" rx="4" fill="#1D9E75" stroke="#0F6E56" stroke-width="1.4"/>
<text x="718.7" y="282" font-size="12" fill="#0F6E56" font-weight="bold">0.0992</text>

<text x="372" y="318" font-size="11.5" fill="#0f172a" text-anchor="end">residual (observed − placebo)</text>
<rect x="380" y="306" width="195.6" height="26" rx="4" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1.2"/>
<text x="583.6" y="324" font-size="11.5" fill="#0F6E56">0.0587</text>

<text x="372" y="358" font-size="11.5" fill="#0f172a" text-anchor="end">placebo (future → past)</text>
<rect x="380" y="346" width="135.1" height="26" rx="4" fill="#F5C4B3" stroke="#993C1D" stroke-width="1.2"/>
<text x="523.1" y="364" font-size="11.5" fill="#993C1D">0.0405</text>
<path d="M404,386 C440,386 455,386 491,386" fill="none" stroke="#2563eb" stroke-width="1.4" stroke-dasharray="5 4" marker-start="url(#arrowblue)"/>
<rect x="430" y="377" width="36" height="17" rx="4" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
<text x="448" y="390" font-size="10" fill="#2563eb" text-anchor="middle">rev.</text>

<text x="380" y="408" font-size="11" fill="#64748b">n = 200,418 transfer events (23,450 learners) · 100 permutations</text>

<rect x="380" y="430" width="300" height="62" rx="8" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1.2"/>
<text x="396" y="452" font-size="13" fill="#0F6E56" font-weight="bold">p = 0.0099  (1/100 shuffles)</text>
<text x="396" y="470" font-size="11.5" fill="#475569">observed exceeds the null band →</text>
<text x="396" y="485" font-size="11.5" fill="#475569">structure makes a real contribution</text>

<rect x="722" y="420" width="290" height="172" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="738" y="442" font-size="12" font-weight="bold" fill="#0f172a">Legend</text>

<rect x="738" y="452" width="22" height="13" rx="3" fill="#1D9E75" stroke="#0F6E56" stroke-width="1.2"/>
<text x="768" y="463" font-size="11.5" fill="#334155">observed cross-family durable</text>

<rect x="738" y="472" width="22" height="13" rx="3" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1"/>
<text x="768" y="483" font-size="11.5" fill="#334155">residual over placebo</text>

<rect x="738" y="492" width="22" height="13" rx="3" fill="#F5C4B3" stroke="#993C1D" stroke-width="1"/>
<text x="768" y="503" font-size="11.5" fill="#334155">placebo (future → past)</text>

<rect x="738" y="512" width="22" height="13" rx="3" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1"/>
<text x="768" y="523" font-size="11.5" fill="#334155">caveat confound (LARGER)</text>

<rect x="738" y="532" width="22" height="13" rx="2" fill="#fee2e2" opacity="0.7"/>
<text x="768" y="543" font-size="11.5" fill="#334155">permutation null band</text>

<line x1="739" y1="558" x2="761" y2="558" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
<text x="768" y="562" font-size="11.5" fill="#334155">prerequisite edge</text>

<line x1="739" y1="576" x2="761" y2="576" stroke="#2563eb" stroke-width="1.4" stroke-dasharray="5 4"/>
<path d="M90 575 l5 5 l-5 5 l-5 -5 z" fill="#dc2626" transform="translate(649,1)"/>
<text x="768" y="580" font-size="11.5" fill="#334155">transfer edge · ◆ mastery gate</text>

