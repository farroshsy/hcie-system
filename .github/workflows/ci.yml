name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install lint + security tools
        run: pip install flake8 bandit
      - name: Syntax / undefined-name gate (hard)
        run: python -m flake8 --select=E9 --count HCIE_SYSTEM_BACKEND_FINAL/01_source
      - name: Byte-compile backend source
        run: python -m compileall -q HCIE_SYSTEM_BACKEND_FINAL/01_source
      - name: Bandit HIGH-severity security gate (blocking; 0 HIGH after the MD5 usedforsecurity fixes)
        run: python -m bandit -r HCIE_SYSTEM_BACKEND_FINAL/01_source -lll -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: HCIE_SYSTEM_FRONTENDV3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: npm ci || npm install
      - name: Typecheck (informational)
        run: npx tsc --noEmit || true
