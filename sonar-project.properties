# SonarQube config for the HCIE evidence repository (the curated, presented code).
# Run:  ./scripts/run_coverage.sh   then   SONAR_TOKEN=<tok> ./scripts/run_sonar_scan.sh
sonar.projectKey=hcie
sonar.projectName=HCIE - Cold-Start Adaptive Learning
sonar.projectVersion=1.0

# --- sources (the code assessed) ---
sonar.sources=HCIE_SYSTEM_BACKEND_FINAL/01_source,HCIE_SYSTEM_FRONTENDV3/src
sonar.tests=HCIE_SYSTEM_BACKEND_FINAL/02_tests

# --- language settings ---
sonar.python.version=3.10
sonar.sourceEncoding=UTF-8

# --- exclude build output, deps, caches, generated, legacy/backup ---
sonar.exclusions=\
  **/__pycache__/**,\
  **/*.pyc,\
  **/_legacy/**,\
  **/*_backup.py,\
  **/99_legacy_quarantine/**,\
  **/node_modules/**,\
  **/.next/**,\
  **/dist/**,\
  **/build/**,\
  **/*.min.js,\
  **/migrations/versions/**

# --- coverage scope ---
# Sonar's coverage here reflects the BACKEND Python test suite (02_tests, run via
# run_coverage.sh). The frontend has no unit-test suite by design — its quality is
# governed by ESLint + Fallow (see /dashboard/quality) — so it is excluded from the
# coverage metric rather than counted as 0%. Non-testable backend entrypoints
# (CLIs, demo seeders, one-off scripts) are excluded for the same reason.
sonar.coverage.exclusions=\
  HCIE_SYSTEM_FRONTENDV3/**,\
  **/02_tests/**,\
  **/__main__.py,\
  **/*_demo.py,\
  **/seed_*.py,\
  **/03_scripts/**,\
  **/11_build/**
sonar.python.coverage.reportPaths=coverage.xml

# --- duplication scope ---
# The bilingual i18n dictionary mirrors the SAME key structure across en/id — that is
# intentional translation parity, not copy-paste duplication, so it is excluded from CPD.
sonar.cpd.exclusions=\
  **/02_tests/**,\
  **/migrations/**,\
  HCIE_SYSTEM_FRONTENDV3/src/lib/i18n/**
